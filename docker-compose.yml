services:
  db:
    image: postgres:16-alpine
    container_name: maravo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maravo
      POSTGRES_PASSWORD: maravo
      POSTGRES_DB: maravo
    ports:
      - "5434:5432"
    volumes:
      - maravo-pgdata:/var/lib/postgresql/data
volumes:
  maravo-pgdata:
